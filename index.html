<!DOCTYPE html>
<html lang="sk">
<head>
    <style>
        body { background-color: #2c2c2c; color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        .container { border: 4px solid #555; padding: 20px; max-width: 500px; background: #333; }
        select, input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background-color: #2ecc71; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Minecraft Texture AI</h2>
    <label>Vyber typ:</label>
    <select id="type">
        <option value="block">Blok (16x16)</option>
        <option value="item">Predmet (Tool/Item)</option>
        <option value="mob">Mob/Entita</option>
    </select>
    
    <label>Popis (napr. "diamantový meč s ohňom"):</label>
    <input type="text" id="prompt" placeholder="Zadaj čo chceš...">
    
    <button onclick="generateTexture()">Vygenerovať</button>
    
    <div id="result" style="margin-top:20px; text-align:center;">
        <img id="output" src="" alt="Tu sa objaví tvoja textúra" style="display:none; image-rendering: pixelated; width: 128px; height: 128px;">
    </div>
</div>

<script>
    function generateTexture() {
        const type = document.getElementById('type').value;
        const prompt = document.getElementById('prompt').value;
        
        // Tu by bola logika pre volanie API (napr. OpenAI DALL-E)
        console.log("Generujem:", type, "pre:", prompt);
        
        alert("Tu by prebehlo prepojenie na API. Bez API kľúča a backendu obrázok nevygenerujeme.");
    }
</script>

</body>
</html>
